name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: todo-app/package-lock.json

      - name: Install dependencies
        working-directory: todo-app
        run: npm ci

      - name: Build
        working-directory: todo-app
        run: npm run build
